spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_username}
    password: ${DB_PW}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 500

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

  devtools:
    restart:
      enabled: true

  output:
    ansi:
      enabled: always

  security:
    oauth2:
      kakao:
        public-key-url: ${KAKAO_PUBLIC_KEY_URL}
        iss: ${KAKAO_ISS}
        app-key: ${KAKAO_APP_KEY}

  firebase:
    config: ${FIRE_BASE_CONFIG}

jwt:
  secret: ${JWT_SECRET}
  time:
    access: 3600000      # 1 hour (ms)
    refresh: 2592000000  # 30 days (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    authentication:
      username: ${SWAGGER_USERNAME}
      password: ${SWAGGER_PW}
      profile-scope:
        - dev

discord:
  web-hook-url: ${DISCORD_WEBHOOK_URL}

s3:
  bucket: ${AWS_BUCKET}
  region: ap-northeast-2
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}

cors:
  urls:
    - http://localhost:8080
    - http://localhost:3000
    - http://localhost:5500
    - http://localhost:5501
    - http://localhost:3453
    - http://localhost:8800
  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE