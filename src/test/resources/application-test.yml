spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 500

  data:
    redis:
      host: localhost
      port: 6379

  devtools:
    restart:
      enabled: false

  output:
    ansi:
      enabled: always

  firebase:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  time:
    access: 3600000
    refresh: 2592000000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    authentication:
      username: ${LOCAL_SWAGGER_USERNAME}
      password: ${LOCAL_SWAGGER_PW}
      profile-scope:
        - dev

discord:
  web-hook-url: ${DISCORD_WEBHOOK_URL}

s3:
  bucket: ${AWS_BUCKET}
  region: ap-northeast-2
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}

cors:
  urls:
    - http://localhost:8080
    - http://localhost:3000
    - http://localhost:5500
    - http://localhost:5501
    - http://localhost:3453
    - http://localhost:8800
  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
