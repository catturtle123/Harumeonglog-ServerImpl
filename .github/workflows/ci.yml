name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - develop

permissions: write-all

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      # application.yml 필요하면 이 블록을 활성화하세요
      # - name: Make application.yml
      #   run: |
      #     cd ./src/main/resources
      #     touch ./application.yml
      #     echo "${{ secrets.APPLICATION_YAML }}" | base64 --decode > ./application.yml
      #   shell: bash

      # 테스트 및 커버리지 리포트 생성 (실패해도 통과시킴)
      - name: Run Tests and Generate Jacoco Report
        run: ./gradlew clean test jacocoTestReport
        continue-on-error: true
        shell: bash

      # 커버리지 PR 코멘트 등록
      - name: Jacoco Report to PR
        uses: madrapps/jacoco-report@v1.6.1
        id: jacoco
        continue-on-error: true
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 90 # 실패는 아래 step에서 직접 판단
          min-coverage-changed-files: 90
          title: "⭐️Code Coverage"
          update-comment: true

      # 커버리지가 90% 미만이면 CI 실패
      - name: Fail if coverage is below 90%
        run: |
          echo "Overall coverage: ${{ steps.jacoco.outputs.coverage-overall }}%"
          COVERAGE=${{ steps.jacoco.outputs.coverage-overall }}
          THRESHOLD=90
          COVERAGE_INT=${COVERAGE%.*}

          if [ "$COVERAGE_INT" -lt "$THRESHOLD" ]; then
            echo "❌ Overall coverage is below ${THRESHOLD}%!"
            exit 1
          else
            echo "✅ Coverage is acceptable."
          fi
